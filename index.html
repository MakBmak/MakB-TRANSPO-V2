<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Transport Coordinator V3.1</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="top">
    <div><h1>Transport Coordinator</h1><p id="subtitle">Any pickup → any destination</p></div>
    <button id="settingsBtn" class="pill">⚙ Settings</button>
  </header>

  <main class="wrap">
    <section class="toolbar">
      <button id="addJourneyBtn" class="primary">+ Add Journey</button>
      <button id="copyBtn">Copy Today → This Day</button>
      <button id="clearBtn" class="danger">Clear This Day</button>
      <input id="datePick" type="date" />
    </section>

    <div id="warning" class="warning hidden"></div>
    <section id="drivers" class="drivers"></section>
  </main>

  <dialog id="journeyDlg">
    <form id="journeyForm" method="dialog" class="dlg">
      <h2 id="journeyTitle">Journey</h2>
      <input type="hidden" id="journeyId" />
      <label>Passenger / Group <input id="passenger" required placeholder="E or M & JO" /></label>
      <div class="grid2">
        <label>Pickup <select id="from"></select></label>
        <label>Destination <select id="to"></select></label>
      </div>
      <div class="grid2">
        <label>Leave time <input id="time" type="time" required /></label>
        <label>Driver <select id="driver"></select></label>
      </div>
      <p id="routeHint" class="hint"></p>
      <div class="actions">
        <button type="button" id="deleteJourney" class="danger hidden">Delete</button>
        <button type="button" onclick="document.getElementById('journeyDlg').close()">Cancel</button>
        <button class="primary" id="saveJourney">Save</button>
      </div>
    </form>
  </dialog>

  <dialog id="settingsDlg">
    <form method="dialog" class="dlg wide">
      <h2>Settings</h2>
      <div class="tabs">
        <button type="button" class="tab active" data-tab="places">Places</button>
        <button type="button" class="tab" data-tab="routes">Travel Times</button>
        <button type="button" class="tab" data-tab="driversTab">Drivers</button>
      </div>
      <section id="places" class="tabPanel"></section>
      <section id="routes" class="tabPanel hidden"></section>
      <section id="driversTab" class="tabPanel hidden"></section>
      <div class="actions"><button class="primary">Done</button></div>
    </form>
  </dialog>

  <script src="script.js"></script>
</body>
</html>
