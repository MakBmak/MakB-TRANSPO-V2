<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>MakB TRANSPO V2</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <h1>MakB TRANSPO</h1>
      <p>H = Home · UB = Unit Base · ST = SET</p>
    </div>
    <button id="todayBtn" class="small-btn">Today</button>
  </header>

  <main>
    <section class="date-card">
      <button id="prevDay" class="round-btn">◀</button>
      <div class="date-centre">
        <div id="dateLabel" class="date-label"></div>
        <div id="modeLabel" class="mode-label"></div>
      </div>
      <button id="nextDay" class="round-btn">▶</button>
    </section>

    <section class="actions">
      <button id="addJourney" class="primary">+ Add Journey</button>
      <button id="copyToday" class="secondary">Copy Today → This Day</button>
      <button id="clearDay" class="danger-light">Clear This Day</button>
    </section>

    <section id="warning" class="warning hidden"></section>

    <section class="driver-grid">
      <article class="driver-card" id="mkCard">
        <div class="driver-title"><span>🚗 MK</span><span id="mkStatus">Available</span></div>
        <div id="mkList" class="journey-list"></div>
      </article>

      <article class="driver-card" id="cyCard">
        <div class="driver-title"><span>🚗 CY</span><span id="cyStatus">Available</span></div>
        <div id="cyList" class="journey-list"></div>
      </article>
    </section>
  </main>

  <dialog id="journeyDialog">
    <form id="journeyForm" method="dialog">
      <h2 id="dialogTitle">Add Journey</h2>
      <input type="hidden" id="journeyId" />

      <label>Passenger(s)
        <input id="passengers" required placeholder="E, R, J+R" />
      </label>

      <div class="row">
        <label>From
          <select id="fromLoc">
            <option value="H">Home</option>
            <option value="UB">Unit Base</option>
            <option value="ST">SET</option>
          </select>
        </label>
        <label>To
          <select id="toLoc">
            <option value="UB">Unit Base</option>
            <option value="ST">SET</option>
            <option value="H">Home</option>
          </select>
        </label>
      </div>

      <div class="row">
        <label>Leave time
          <input id="leaveTime" type="time" required />
        </label>
        <label>Escort
          <select id="driver">
            <option>MK</option>
            <option>CY</option>
          </select>
        </label>
      </div>

      <div class="dialog-actions">
        <button type="button" id="deleteJourney" class="danger hidden">Delete</button>
        <button type="button" id="cancelDialog" class="secondary">Cancel</button>
        <button class="primary">Save</button>
      </div>
    </form>
  </dialog>

  <script src="script.js"></script>
</body>
</html>
