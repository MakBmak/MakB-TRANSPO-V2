<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MakB TRANSPO V2</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>MakB TRANSPO</h1>
      <p>H = Home · UB = Unit Base · ST = SET</p>
    </div>
    <button id="todayBtn" class="pill">Today</button>
  </header>

  <main class="wrap">
    <section class="controls">
      <button id="addJourneyBtn" class="primary">+ Add Journey</button>
      <button id="settingsBtn">⚙ Settings</button>
      <button id="copyBtn">Copy Today → This Day</button>
      <button id="clearBtn" class="danger">Clear This Day</button>
    </section>

    <section id="warning" class="warning hidden"></section>
    <section id="driversGrid" class="drivers-grid"></section>
  </main>

  <dialog id="journeyDialog">
    <form method="dialog" id="journeyForm" class="dialog-card">
      <h2 id="journeyTitle">Add Journey</h2>
      <input type="hidden" id="journeyId" />

      <label>Passenger name
        <input id="passengerInput" required placeholder="E, M, JB & ROS" />
      </label>

      <div class="two">
        <label>From
          <select id="fromInput">
            <option value="H">Home</option>
            <option value="UB">Unit Base</option>
            <option value="ST">SET</option>
          </select>
        </label>
        <label>To
          <select id="toInput">
            <option value="UB">Unit Base</option>
            <option value="ST">SET</option>
            <option value="H">Home</option>
          </select>
        </label>
      </div>

      <div class="two">
        <label>Leave time
          <input id="timeInput" type="time" required />
        </label>
        <label>Driver
          <select id="driverInput"></select>
        </label>
      </div>

      <div class="dialog-actions">
        <button type="button" id="deleteJourneyBtn" class="danger hidden">Delete</button>
        <span></span>
        <button type="button" onclick="journeyDialog.close()">Cancel</button>
        <button class="primary" value="default">Save</button>
      </div>
    </form>
  </dialog>

  <dialog id="settingsDialog">
    <form method="dialog" id="settingsForm" class="dialog-card wide">
      <h2>Settings</h2>

      <h3>Travel times</h3>
      <div class="two">
        <label>Home → Unit Base minutes
          <input id="timeHUB" type="number" min="1" max="240" />
        </label>
        <label>Unit Base → SET minutes
          <input id="timeUBST" type="number" min="1" max="240" />
        </label>
      </div>

      <h3>Drivers <small>(up to 5)</small></h3>
      <div id="driversSettings"></div>
      <button type="button" id="addDriverBtn">+ Add Driver</button>

      <div class="dialog-actions">
        <span></span><span></span>
        <button type="button" onclick="settingsDialog.close()">Cancel</button>
        <button class="primary" value="default">Save</button>
      </div>
    </form>
  </dialog>

  <script src="script.js"></script>
</body>
</html>
